version: '3.8'

services:
  postgres:
    image: postgres
    container_name: postgres-sales-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simple-sales-tool
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: